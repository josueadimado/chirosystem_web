services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.reliefchiropractic.net/api/v1}
    container_name: chiroflow-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.reliefchiropractic.net/api/v1}
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web

networks:
  web:
    external: true